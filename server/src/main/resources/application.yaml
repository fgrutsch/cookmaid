ktor:
  deployment:
    port: 8081
    host: 0.0.0.0
  application:
    modules:
      - io.github.fgrutsch.cookmaid.ApplicationKt.module

database:
  url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cookmaid}
  user: ${DATABASE_USER:cookmaid}
  password: ${DATABASE_PASSWORD:cookmaid}
  pool-size: ${DATABASE_POOL_SIZE:5}

oidc:
  issuer: ${OIDC_ISSUER:http://localhost:3001/oidc}
  jwks-url: ${OIDC_JWKS_URL:http://localhost:3001/oidc/jwks}
  audience: ${OIDC_AUDIENCE}

web:
  dir: ${WEB_DIR:web}

csp:
  # Space-separated extra connect-src origins (IdP, CDN, …). Origins only, no path.
  # Production sets a wildcard, e.g. CSP_CONNECT_SRC=https://*.example.com.
  connect-src: ${CSP_CONNECT_SRC:http://localhost:3001}
