name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: gradle/actions/setup-gradle@v6

      - name: Run detekt
        run: ./gradlew detektAll

  server:
    name: Server
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: gradle/actions/setup-gradle@v6

      - name: Test
        run: ./gradlew :server:test

      - name: Coverage
        run: ./gradlew :server:koverXmlReport

      - name: Check coverage
        run: ./gradlew :server:koverVerify

      - name: Build distribution
        run: ./gradlew :server:installDist

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: true
          use_oidc: true

  core:
    name: Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: gradle/actions/setup-gradle@v6

      - name: Test
        run: ./gradlew :core:allTests

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew :app:androidApp:assembleDebug

  shared:
    name: Shared UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: gradle/actions/setup-gradle@v6

      - name: Test
        run: ./gradlew :app:shared:allTests

  webApp:
    name: WebApp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: gradle/actions/setup-gradle@v6
      - name: Build production distribution
        run: ./gradlew :app:webApp:wasmJsBrowserDistribution
      - name: Verify OIDC placeholders survived (not baked with dev config)
        run: grep -q '${OIDC_DISCOVERY_URI}' app/webApp/build/dist/wasmJs/productionExecutable/index.html
