name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Run detekt
        run: ./gradlew detektAll

  server:
    name: Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :server:build

      - name: Test
        run: ./gradlew :server:test

      - name: Coverage
        run: ./gradlew :server:koverXmlReport

      - name: Check coverage
        run: ./gradlew :server:koverVerify

  shared:
    name: Shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Test
        run: ./gradlew :shared:allTests

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :androidApp:assembleDebug

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Build WasmJS
        run: ./gradlew :composeApp:compileKotlinWasmJs

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [detekt, server, shared, android, web]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: ./gradlew buildDockerImage
      - uses: docker/login-action@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=$(./gradlew -q currentVersion -Prelease.quiet)
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -t ghcr.io/${{ github.repository }}:${VERSION} \
            -t ghcr.io/${{ github.repository }}:latest \
            -f docker/Dockerfile \
            .
