name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Run detekt
        run: ./gradlew detektAll

  server:
    name: Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Test
        run: ./gradlew :server:test

      - name: Coverage
        run: ./gradlew :server:koverXmlReport

      - name: Check coverage
        run: ./gradlew :server:koverVerify

  shared:
    name: Shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Test
        run: ./gradlew :shared:allTests

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :androidApp:assembleDebug

  composeApp:
    name: ComposeApp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Test
        run: ./gradlew :composeApp:allTests

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [detekt, server, shared, android, composeApp]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: ./gradlew buildDockerImage
      - uses: docker/login-action@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        run: ./gradlew pushDockerImage -Pdocker.registry=ghcr.io/${{ github.repository }}
