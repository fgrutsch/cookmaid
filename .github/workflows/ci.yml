name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Run detekt
        run: ./gradlew detektAll

  server:
    name: Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :server:build

      - name: Test
        run: ./gradlew :server:test

      - name: Coverage
        run: ./gradlew :server:koverXmlReport

      - name: Check coverage
        run: ./gradlew :server:koverVerify

  shared:
    name: Shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Test
        run: ./gradlew :shared:allTests

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :androidApp:assembleDebug

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4

      - name: Build WasmJS
        run: ./gradlew :composeApp:compileKotlinWasmJs

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [detekt, server, shared, android, web]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2
      - uses: gradle/actions/setup-gradle@v4
      - name: Build artifacts
        run: ./gradlew :server:installDist :composeApp:wasmJsBrowserProductionWebpack
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
      - uses: docker/login-action@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
