name: Release

on:
  push:
    tags: ['v*']

jobs:
  docker:
    name: Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: gradle/actions/setup-gradle@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to GHCR
        run: ./gradlew pushDockerImage -Pdocker.registry=ghcr.io/${{ github.repository }}

  android:
    name: Build Android artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v6
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks
      - name: Create keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=${{ github.workspace }}/release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
      - name: Build APK and AAB
        run: ./gradlew :app:androidApp:assembleProdRelease :app:androidApp:bundleProdRelease
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          apk=$(find androidApp/build/outputs/apk/prod/release -name "*.apk" | head -1)
          aab=$(find androidApp/build/outputs/bundle/prodRelease -name "*.aab" | head -1)
          gh release upload "$GITHUB_REF_NAME" \
            "${apk}#cookmaid-${version}.apk" \
            "${aab}#cookmaid-${version}.aab" \
            --repo "$GITHUB_REPOSITORY"

  publish-release:
    name: Publish Release Draft
    needs: [docker, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --repo ${{ github.repository }} --draft=false --latest
