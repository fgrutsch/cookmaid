<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookmaid</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2D3E50">
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #ffffff;
        }
        @media (prefers-color-scheme: dark) {
            html, body {
                background-color: #1a1c1e;
            }
        }
    </style>
</head>
<body style="text-align: center; align-content: center">
<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 50 50" role="presentation">
    <circle cx="25" cy="25" r="20" stroke="#ccc" stroke-width="4" fill="none"/>
    <circle cx="25" cy="25" r="20" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"
            stroke-dasharray="90 125">
        <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s"
                          repeatCount="indefinite"/>
    </circle>
</svg>
<script>
    var currentLanguagesImpl = Object.getOwnPropertyDescriptor(Navigator.prototype, "languages");
    Object.defineProperty(Navigator.prototype, "languages", Object.assign({}, currentLanguagesImpl, {
        get: function () {
            if (window.__customLocale) {
                return [window.__customLocale];
            }
            return currentLanguagesImpl.get.apply(this);
        }
    }));
</script>
<script>
    window.__CONFIG__ = {
        OIDC_DISCOVERY_URI: "${OIDC_DISCOVERY_URI}",
        OIDC_CLIENT_ID: "${OIDC_CLIENT_ID}",
        OIDC_SCOPE: "${OIDC_SCOPE}",
        OIDC_ACCOUNT_URI: "${OIDC_ACCOUNT_URI}",
    };
</script>
<script type="application/javascript" src="composeApp.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js')
            .catch(err => console.error('SW registration failed:', err));
    }
</script>
</body>
</html>
