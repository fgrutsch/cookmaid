services:
  cookmaid:
    image: ghcr.io/fgrutsch/cookmaid:latest
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/cookmaid
      DATABASE_USER: cookmaid
      DATABASE_PASSWORD: cookmaid
      OIDC_ISSUER: http://localhost:3001/oidc
      OIDC_JWKS_URL: http://logto:3001/oidc/jwks
      OIDC_AUDIENCE: http://localhost:8081/api
      OIDC_DISCOVERY_URI: http://localhost:3001/oidc/.well-known/openid-configuration
      OIDC_CLIENT_ID: cookmaid-demo
      OIDC_SCOPE: "openid profile email"
      OIDC_ACCOUNT_URI: http://localhost:3001/account/security
      OIDC_RESOURCE: http://localhost:8081/api
    depends_on:
      postgres:
        condition: service_healthy
      logto:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - demo-data:/var/lib/postgresql
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    environment:
      POSTGRES_USER: cookmaid
      POSTGRES_PASSWORD: cookmaid
      POSTGRES_DB: cookmaid
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookmaid"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  logto:
    image: svhd/logto:1.40.1
    restart: unless-stopped
    entrypoint: ["sh", "-c", "npm run cli db seed -- --swe && npm start"]
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      DB_URL: postgres://cookmaid:cookmaid@postgres:5432/logto
      TRUST_PROXY_HEADER: 1
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3001/api/status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  logto-seed:
    image: postgres:18-alpine
    volumes:
      - ./seed_logto.sql:/seed_logto.sql:ro
    entrypoint: ["sh", "-c", "until pg_isready -h postgres -U cookmaid; do sleep 1; done && sleep 10 && psql -h postgres -U cookmaid -d logto -f /seed_logto.sql"]
    environment:
      PGPASSWORD: cookmaid
    depends_on:
      logto:
        condition: service_healthy

volumes:
  demo-data:
