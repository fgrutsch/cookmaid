services:
  cookmaid:
    image: ghcr.io/fgrutsch/cookmaid:latest
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/cookmaid
      DATABASE_USER: cookmaid
      DATABASE_PASSWORD: cookmaid
      OIDC_ISSUER: http://localhost:8082
      OIDC_JWKS_URL: http://nginx:8082/.well-known/jwks.json
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-placeholder}
      OIDC_DISCOVERY_URI: http://localhost:8082/.well-known/openid-configuration
      OIDC_SCOPE: "openid profile email offline_access"
      OIDC_ACCOUNT_URI: http://localhost:8082/settings
    depends_on:
      postgres:
        condition: service_healthy
      nginx:
        condition: service_started

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - demo-data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    environment:
      POSTGRES_USER: cookmaid
      POSTGRES_PASSWORD: cookmaid
      POSTGRES_DB: cookmaid
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookmaid"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  nginx:
    image: nginx:1-alpine
    restart: unless-stopped
    ports:
      - "8082:8082"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      pocket-id:
        condition: service_healthy

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2.5.0
    restart: unless-stopped
    environment:
      APP_URL: http://localhost:8082
      ENCRYPTION_KEY: 9gsZlxKb0bGfgkFEiczMeC8PkqiWTP1DPry9kZ7U/3U=
      TRUST_PROXY: "true"
      DB_CONNECTION_STRING: postgres://cookmaid:cookmaid@postgres:5432/pocketid
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:1411/health"]
      interval: 90s
      timeout: 5s
      retries: 2
      start_period: 10s

volumes:
  demo-data:
