services:
  nginx:
    image: nginx:1.29.6-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      pocket-id:
        condition: service_healthy

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2.4.0
    restart: unless-stopped
    ports:
      - "1411:1411"
    volumes:
      - pocket-id-data:/app/data
    environment:
      APP_URL: http://idp.localhost
      ENCRYPTION_KEY: 9gsZlxKb0bGfgkFEiczMeC8PkqiWTP1DPry9kZ7U/3U=
      TRUST_PROXY: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:1411/health"]
      interval: 90s
      timeout: 5s
      retries: 2
      start_period: 10s

volumes:
  pocket-id-data:
    name: cookmaid_pocket-id-data
