services:
  postgres:
    image: postgres:18.3-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    environment:
      POSTGRES_USER: cookmaid
      POSTGRES_PASSWORD: cookmaid
      POSTGRES_DB: cookmaid
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookmaid"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  nginx:
    image: nginx:1.29.6-alpine
    restart: unless-stopped
    ports:
      - "8082:8082"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      pocket-id:
        condition: service_healthy

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2.5.0
    restart: unless-stopped
    ports:
      - "1411:1411"
    environment:
      APP_URL: http://localhost:8082
      ENCRYPTION_KEY: 9gsZlxKb0bGfgkFEiczMeC8PkqiWTP1DPry9kZ7U/3U=
      TRUST_PROXY: "true"
      DB_CONNECTION_STRING: postgres://cookmaid:cookmaid@postgres:5432/pocketid
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:1411/health"]
      interval: 90s
      timeout: 5s
      retries: 2
      start_period: 10s
