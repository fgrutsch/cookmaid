events {}

http {
    server {
        listen 443 ssl;
        server_name idp.localhost;

        client_max_body_size 3m;
        ssl_certificate /etc/nginx/certs/idp.localhost.pem;
        ssl_certificate_key /etc/nginx/certs/idp.localhost-key.pem;

        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "http://localhost:8080" always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
                return 204;
            }

            proxy_pass http://pocket-id:1411;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Hide CORS headers from Pocket ID, replace with our own
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;

            add_header Access-Control-Allow-Origin "http://localhost:8080" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        }
    }
}
